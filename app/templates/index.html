{% extends "base.html" %}

{% block content %}
<div class="dashboard">
    <div class="hero">
        <h1>Transform Your Reading</h1>
        <p>Convert eBooks and Text to lifelike Vietnamese speech.</p>

        <div class="upload-container">
            <div class="card">
                <h3>Import File</h3>
                <p>PDF, EPUB, DOCX, TXT</p>
                <form id="uploadForm">
                    <input type="file" id="fileInput" name="file" accept=".pdf,.epub,.docx,.txt" style="display: none;">
                    <button type="button" class="btn btn-primary"
                        onclick="document.getElementById('fileInput').click()">Select File</button>
                    <div id="fileName" class="status-text"></div>
                </form>
            </div>

            <div class="divider">OR</div>

            <div class="card">
                <h3>Read from URL</h3>
                <p>Clean articles from the web</p>
                <form id="urlForm" class="url-form">
                    <input type="url" id="urlInput" name="url" placeholder="https://example.com/article" required>
                    <button type="submit" class="btn btn-secondary">Go</button>
                </form>
            </div>
        </div>
        <div id="loading" style="display:none; margin-top: 20px;">Processing...</div>
    </div>
</div>

<style>
    .upload-container {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 40px;
    }

    .card {
        background: var(--bg-card);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid var(--border);
        width: 300px;
        transition: transform 0.2s;
    }

    .card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
    }

    .divider {
        display: flex;
        align-items: center;
        color: var(--text-muted);
        font-weight: 600;
    }

    .status-text {
        margin-top: 10px;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .url-form {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    input[type="url"] {
        background: var(--bg-dark);
        border: 1px solid var(--border);
        color: white;
        padding: 10px;
        border-radius: 8px;
        flex: 1;
    }

    .btn-secondary {
        background: #3a3f4b;
        color: white;
    }
</style>

<script>
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileName').textContent = file.name;
        document.getElementById('loading').style.display = 'block';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.status === 'success') {
                window.location.href = '/reader';
            }
        } catch (err) {
            alert('Upload failed');
        }
    });

    document.getElementById('urlForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('loading').style.display = 'block';
        const url = document.getElementById('urlInput').value;
        const formData = new FormData();
        formData.append('url', url);

        try {
            const res = await fetch('/api/read-url', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.status === 'success') {
                window.location.href = '/reader';
            }
        } catch (err) {
            alert('Failed to fetch URL');
        }
    });
</script>
{% endblock %}
